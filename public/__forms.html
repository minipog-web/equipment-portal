<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Form Bridge</title>
</head>
<body>
    <!-- This form is here so Netlify can detect it and enable email notifications -->
    <form name="equipment-request" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="name" />
        <input type="text" name="location" />
        <input type="text" name="room" />
        <input type="text" name="equipment" />
        <input type="text" name="model" />
        <input type="text" name="urgency" />
        <input type="text" name="imageUrl" />
        <input type="text" name="id" />
        <textarea name="details"></textarea>
    </form>
</body>
</html>
